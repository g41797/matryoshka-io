name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'helpers/**'
      - 'examples/**'
      - 'stories/**'
      - 'kitchen/**'
      - 'build.zig'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Regenerate Autodoc Artifacts
        run: ./kitchen/tools/docs_zig.sh

      - name: Build MkDocs Site
        run: |
          pip install mkdocs-material
          cd kitchen && mkdocs build -f mkdocs.yml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
