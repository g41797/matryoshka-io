          - "Item: ShutdownCommand": examples/items/ShutdownCommand.md
          - "Item: Timer": examples/items/Timer.md
          - "Hook: AlwaysCreateHooks": examples/hooks/AlwaysCreateHooks.md
          - "Hook: CappedPoolHooks": examples/hooks/CappedPoolHooks.md
