site_name: matryoshka-io
docs_dir: docs
site_dir: output
site_description: Building Blocks for Modular Monoliths in Zig
repo_url: https://github.com/g41797/matryoshka-io/
repo_name: matryoshka-io on GitHub

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - The Manifesto: manifesto.md
  - Story — Print Server:
      - Discussion: story/print-server/discussion.md
      - Requirements: story/print-server/requirements.md
      - Matryoshka Translation: story/print-server/translation.md
      - Flow Diagram: story/print-server/flow.md
  - Building Blocks:
      - Overview: building-blocks/index.md
      - PolyNode: building-blocks/polynode.md
      - Mailbox: building-blocks/mailbox.md
      - Pool: building-blocks/pool.md
      - Master: building-blocks/master.md
  - API Reference:
      - PolyNode & NodeHandle & Slot: api/polynode.md
      - Mailbox: api/mailbox.md
      - Pool: api/pool.md
      - Tag Identity & Slot Programming: api/tags-and-slots.md
      - Cooperative Cleanup: api/cleanup.md
      - matryoshka (root) & Master: api/root-and-master.md
      - Cancel Model & Object Lifecycle: api/cancel-and-lifecycle.md
      - Invariants & Contracts: api/invariants.md
  - Patterns & Cookbook:
      - Overview: patterns/index.md
      - Slot & PolyNode Idioms: patterns/slot-and-polynode.md
      - Mailbox & Topology Patterns: patterns/mailbox-and-topology.md
      - Pool Patterns: patterns/pool.md
      - Futures, Select, Group, Cancellation: patterns/async.md
      - Shutdown & Master Patterns: patterns/master-and-shutdown.md
  - Deep Dive — Video Transcoder: deep-dive/video-transcoder.md
  - Addendums:
      - Slot vs Ref-Counting: addendums/slot-vs-ref-counting.md
      - Tag vs Tagged Union: addendums/tag-vs-tagged-union.md
      - Mailbox vs TypeErasedQueue: addendums/typeErasedQueue-vs-mailbox.md
      - Io 101: addendums/io-101.md
  - Reference:
      - API Docs (autodoc): api_reference.md
      - Examples Reference: examples_reference.md

plugins:
  - search

extra:
  generator: false

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: >
  Copyright &copy; 2026 g41797
