site_name: Be Master of your systems
docs_dir: ./docs
site_dir: ../docs
site_description: Building Blocks for Modular Monoliths in Zig
repo_url: https://github.com/g41797/Matryoshka-Io/
repo_name: Matryoshka-Io on GitHub

theme:
  name: material
  logo: assets/images/favicon.ico
  favicon: assets/images/favicon.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - The Manifesto: manifesto.md
  - History:  history.md
  - Building Blocks:
      - Introduction: building-blocks/index.md
      - Item: building-blocks/polynode.md
      - Mailbox: building-blocks/mailbox.md
      - Pool: building-blocks/pool.md
      - Master: building-blocks/master.md
  - API Reference:
      - PolyNode & ItemHandle & Slot: api/polynode.md
      - PolyHelper: api/polyhelper.md
      - Mailbox: api/mailbox.md
      - Pool: api/pool.md
      - Tag Identity & Slot Programming: api/tags-and-slots.md
      - Cooperative Cleanup: api/cleanup.md
      - Matryoshka & Master: api/root-and-master.md
  - Patterns & Cookbook:
      - Slot & PolyNode Idioms: patterns/slot-and-polynode.md
      - Mailbox & Topology Patterns: patterns/mailbox-and-topology.md
      - Pool Patterns: patterns/pool.md
      - Futures, Select, Group, Cancellation: patterns/async.md
      - Shutdown & Master Patterns: patterns/master-and-shutdown.md
